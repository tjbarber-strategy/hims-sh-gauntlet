async function sha256(m){const e=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")}
function loadDash(){const d=atob(B);document.open();document.write(d);document.close()}
async function doUnlock(){const p=document.getElementById("pw").value.trim();const h=await sha256(p);if(h===H){try{sessionStorage.setItem('hims_sh_auth','1')}catch(e){};loadDash()}else{document.getElementById("err").style.display="block";document.getElementById("pw").value="";document.getElementById("pw").focus()}}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();doUnlock()}});
try{if(sessionStorage.getItem('hims_sh_auth')==='1'){loadDash()}}catch(e){}
</script>
